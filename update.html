<!DOCTYPE html>
<html>
<head>
  <title>Update Car Part</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 380px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    .nav {
      text-align: center;
      margin-bottom: 15px;
    }

    .nav a {
      text-decoration: none;
      color: #4facfe;
      font-weight: bold;
    }

    .nav a:hover {
      text-decoration: underline;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 12px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #4facfe;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="nav">
      index.htmlHome</a>
    </div>

    <h2>Update Car Part</h2>

    <label>Select Category</label>
    <select id="categoryDrop"></select>

    <label>ID</label>
    <input id="id" readonly>

    <label>Name</label>
    <input id="name">

    <label>Price</label>
    <input id="price" type="number" step="0.01">

    <label>Stock Quantity</label>
    <input id="stock" type="number">

    <button onclick="updatePart()">Update</button>

  </div>

  <script src="update.js"></script>

</body>
</html>
