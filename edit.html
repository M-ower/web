<!DOCTYPE html>
<html>
<body>

<h1>Update Car Part</h1>

<a href="index.html">Home</a>

<form id="form">
  ID: <input type="number" id="id"><br><br>
  Name: <input type="text" id="name"><br><br>
  Category: <input type="text" id="category"><br><br>
  Price: <input type="number" id="price"><br><br>
  Stock: <input type="number" id="stock"><br><br>

  <button type="submit">Update</button>
</form>

<script>
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  const id = document.getElementById("id").value;

  fetch("http://localhost:5000/api/v1/car_parts/" + id, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name: document.getElementById("name").value,
      category: document.getElementById("category").value,
      price: document.getElementById("price").value,
      stock_quantity: document.getElementById("stock").value
    })
  })
  .then(res => res.json())
  .then(data => {
    alert("Updated!");
  });
});
</script>

</body>
</html>
