<!DOCTYPE html>
<html>
<head>
  <title>Update Car Part</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 360px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    .nav {
      text-align: center;
      margin-bottom: 15px;
    }

    .nav button {
      background: none;
      border: none;
      color: #667eea;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
    }

    .nav button:hover {
      text-decoration: underline;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    button.update {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: linear-gradient(to right, #667eea, #764ba2);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button.update:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- ✅ REAL HOME BUTTON -->
    <div class="nav">
      <button onclick="goHome()">Home</button>
    </div>

    <h1>Update Car Part</h1>

    <form id="form">
      <label>ID</label>
      <input type="number" id="id" readonly>

      <label>Name</label>
      <input type="text" id="name">

      <label>Category</label>
      <input type="text" id="category">

      <label>Price</label>
      <input type="number" id="price">

      <label>Stock</label>
      <input type="number" id="stock">

      <button class="update" type="submit">Update</button>
    </form>

  </div>

  <script>
    function goHome() {
      window.location.href = "index.html";
    }

    const params = new URLSearchParams(window.location.search);
    const partId = params.get("id");

    if (partId) {
      fetch("http://localhost:5000/api/v1/car_parts/" + partId)
        .then(res => res.json())
        .then(data => {
          document.getElementById("id").value = data.id;
          document.getElementById("name").value = data.name;
          document.getElementById("category").value = data.category;
          document.getElementById("price").value = data.price;
          document.getElementById("stock").value = data.stock_quantity;
        });
    }

    document.getElementById("form").addEventListener("submit", function(e){
      e.preventDefault();

      const id = document.getElementById("id").value;

      fetch("http://localhost:5000/api/v1/car_parts/" + id, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          name: document.getElementById("name").value,
          category: document.getElementById("category").value,
          price: document.getElementById("price").value,
          stock_quantity: document.getElementById("stock").value
        })
      })
      .then(res => res.json())
      .then(() => {
        alert("Part updated successfully");
        window.location.href = "view.html";
      });
    });
  </script>

</body>
</html>
